<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Winteq Predictive Maintenance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .auth-wrap {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }
        .auth-card { width: 380px; padding: 36px; }
        .auth-card h2 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
        .auth-card p.subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
        .auth-field { margin-bottom: 16px; }
        .auth-field label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
        .auth-field input {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 11px 14px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }
        .auth-btn {
            width: 100%;
            background: var(--primary-orange);
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        .auth-btn:hover { background: var(--primary-orange-hover); }
        .auth-switch { text-align: center; margin-top: 18px; font-size: 13px; color: var(--text-muted); }
        .auth-switch a { color: var(--primary-orange); text-decoration: none; }
        .flash-msg {
            background: rgba(239, 68, 68, 0.12);
            color: var(--danger);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 12px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="auth-wrap">
        <div class="card glass-card auth-card">
            <h2>Create Account</h2>
            <p class="subtitle">Register a new Winteq user account</p>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for msg in messages %}
                        <div class="flash-msg">{{ msg }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.register') }}">
                <div class="auth-field">
                    <label>Username</label>
                    <input type="text" name="username" required autofocus>
                </div>
                <div class="auth-field">
                    <label>Email</label>
                    <input type="email" name="email" required>
                </div>
                <div class="auth-field">
                    <label>Password</label>
                    <input type="password" name="password" required minlength="6">
                </div>
                <button type="submit" class="auth-btn">Register</button>
            </form>

            <div class="auth-switch">
                Already have an account? <a href="{{ url_for('auth.login') }}">Log in here</a>
            </div>
        </div>
    </div>
</body>
</html>
