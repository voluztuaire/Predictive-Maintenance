<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Winteq Predictive Maintenance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .auth-wrap {
            height: 100vh;
            display: flex;
            background: #000;
            position: relative;
            overflow: hidden;
            align-items: center;
            justify-content: center;
        }
        
        .auth-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(249, 115, 22, 0.08) 0%, transparent 60%),
                radial-gradient(circle at 80% 50%, rgba(249, 115, 22, 0.05) 0%, transparent 60%),
                #000;
        }
        
        .auth-grid {
            position: absolute;
            inset: 0;
            z-index: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.5;
        }
        
        .auth-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }
        
        .auth-card {
            width: 100%;
            padding: 44px 40px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
        }
        
        .auth-card h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text-main);
        }
        
        .auth-card .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 28px;
            line-height: 1.5;
        }
        
        .auth-field {
            margin-bottom: 18px;
        }
        
        .auth-field label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 7px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        
        .auth-field .input-wrap {
            position: relative;
        }
        
        .auth-field .input-wrap i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
            transition: color 0.2s;
        }
        
        .auth-field input {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 13px 14px 13px 44px;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .auth-field input:focus {
            border-color: var(--primary-orange);
            background: rgba(249, 115, 22, 0.04);
            box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.06);
        }
        
        .auth-field .input-wrap:focus-within i {
            color: var(--primary-orange);
        }
        
        .auth-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary-orange), #ea580c);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(249, 115, 22, 0.3);
        }
        
        .auth-switch {
            text-align: center;
            margin-top: 22px;
            font-size: 14px;
            color: var(--text-muted);
        }
        
        .auth-switch a {
            color: var(--primary-orange);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        
        .auth-switch a:hover {
            color: var(--primary-orange-hover);
            text-decoration: underline;
        }
        
        .flash-msg {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.15);
            color: var(--danger);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 18px;
        }
        
        .flash-msg i {
            font-size: 16px;
            flex-shrink: 0;
        }

        .flash-msg.success {
            background: rgba(34, 197, 94, 0.08);
            border-color: rgba(34, 197, 94, 0.15);
            color: var(--success);
        }
        
        @media (max-width: 480px) {
            .auth-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-wrap">
        <div class="auth-bg"></div>
        <div class="auth-grid"></div>
        
        <div class="auth-container">
            <div class="auth-card">
                <h2>Reset Password</h2>
                <p class="subtitle">Enter your username and new password to reset your account access.</p>

                {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        {% for msg in messages %}
                            <div class="flash-msg {% if 'successful' in msg.lower() %}success{% endif %}">
                                <i class="fa-solid {% if 'successful' in msg.lower() %}fa-check-circle{% else %}fa-circle-exclamation{% endif %}"></i>
                                {{ msg }}
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form method="POST" action="{{ url_for('auth.forgot_password') }}">
                    <div class="auth-field">
                        <label>Username</label>
                        <div class="input-wrap">
                            <i class="fa-solid fa-user"></i>
                            <input type="text" name="username" required autofocus placeholder="Enter your username">
                        </div>
                    </div>
                    
                    <div class="auth-field">
                        <label>New Password</label>
                        <div class="input-wrap">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" name="new_password" required minlength="6" placeholder="Enter new password">
                        </div>
                    </div>

                    <div class="auth-field">
                        <label>Confirm Password</label>
                        <div class="input-wrap">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" name="confirm_password" required minlength="6" placeholder="Confirm new password">
                        </div>
                    </div>

                    <button type="submit" class="auth-btn">
                        <i class="fa-solid fa-key" style="margin-right: 8px;"></i>
                        Reset Password
                    </button>
                </form>

                <div class="auth-switch">
                    Remember your password? <a href="{{ url_for('auth.login') }}">Log in here</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
